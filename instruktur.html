<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn - Ruang Instruktur</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const _0xDbChunks = [
        "aHR0cHM6Ly9zY3JpcHQuZ29v",
        "Z2xlLmNvbS9tYWNyb3Mvcy9B",
        "S2Z5Y2J6RXdlUkQ2dTVmeGVH",
        "SEtOR0VJTFhZOWkzcXhibTdP",
        "QVlMZHRaeGxHdmdEOXhDb01D",
        "aUN3OGJDbmpDLXhad3cxbksv",
        "ZXhlYw=="
    ];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));
    const EMAIL_BUTTONS_HTML = `<br><br><div style="text-align:center;"><a href="https://s-tools.id/edu/" style="background-color: #4f46e5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: bold; font-family: sans-serif; margin-right: 10px; margin-bottom: 10px;">Masuk ke Dashboard</a></div>`;

    const emptyExam = { minScore: 70, questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 })) };

    const formatVideoUrl = (rawUrl) => {
        if (!rawUrl) return "";
        let url = rawUrl.trim();
        try {
          if (url.includes('youtu.be/')) { const videoId = url.split('youtu.be/')[1].split('?')[0].split('&')[0]; return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('youtube.com/watch')) { const urlObj = new URL(url); const videoId = urlObj.searchParams.get('v'); if (videoId) return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('drive.google.com/file/d/')) { const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) { return `https://drive.google.com/file/d/${match[1]}/preview`; } }
        } catch (e) {} return url;
    };

    const calcProgress = (enr, crs) => { 
        if (!crs || !crs.modules || crs.modules.length === 0 || !enr) return 0; 
        if (enr.isGraduated) return 100;
        let completedArray = [];
        if (Array.isArray(enr.completedModules)) { completedArray = enr.completedModules; } 
        else if (typeof enr.completedModules === 'string') { try { completedArray = JSON.parse(enr.completedModules); } catch (e) { completedArray = []; } }
        let prog = Math.round((completedArray.length / crs.modules.length) * 100); 
        return prog > 100 ? 100 : prog;
    };

    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const Book = (p) => <IconWrapper name="book" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Article = (p) => <IconWrapper name="article" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const ToggleLeft = (p) => <IconWrapper name="toggle-left" {...p} />;
    const ToggleRight = (p) => <IconWrapper name="toggle-right" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;

    function InstrukturApp() {
      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [dbReady, setDbReady] = React.useState(false);
      const [appMode, setAppMode] = React.useState('dashboard');
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      
      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);
      const [profileForm, setProfileForm] = React.useState({ donationLink: "", whatsapp: "" });
      const [infoInstForm, setInfoInstForm] = React.useState({ text: '', show: false }); 

      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

      React.useEffect(() => {
        if (!session || session.role !== 'admin') {
          window.location.href = 'index.html';
        }
      }, [session]);

      React.useEffect(() => {
          const fetchUrl = DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime();
          fetch(fetchUrl).then(res => res.json()).then(data => {
                if(data.admins) setAdmins(data.admins);
                if(data.courses) setCourses(data.courses);
                if(data.participants) setParticipants(data.participants);
                if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications);

                const myData = data.admins?.find(a => String(a.id) === String(session?.data?.id));
                if (myData) {
                    setProfileForm({ donationLink: myData.donationLink || "", whatsapp: myData.whatsapp || "" });
                    setInfoInstForm({ text: myData.info3 || '', show: myData.showInfo3 || false });
                }
                setDbReady(true);
          }).catch(e => showToast("Gagal memuat database."));
      }, []);

      const execDbAction = async (localAction) => {
        try {
            localAction();
            const payload = { admins, courses, participants, enrollments, notifications };
            const postUrl = DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime();
            fetch(postUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) }).catch(console.error);
        } catch (error) { showToast("Gagal menyimpan."); }
      };

      const triggerEmail = (emailAction) => {
          const postUrl = DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime();
          fetch(postUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ emailAction }) }).catch(console.error);
      };

      const handleLogout = () => { sessionStorage.removeItem('edu_session'); window.location.href = 'index.html'; };

      const handleCreateCourse = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const code = fd.get('code').trim().toUpperCase();
        const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (myAdmin.maxCourses <= 0) return showToast("Kuota kelas habis!");

        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), isActive: true, docLink: fd.get('docLink'), modules: [], exam: emptyExam };
        await execDbAction(() => {
            setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, maxCourses: a.maxCourses - 1 } : a));
            setCourses([...courses, { id: `c_${Date.now()}`, ...courseData }]);
        });
        e.target.reset(); showToast("Kursus dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const courseId = fd.get('courseId');
        const finalVideoUrl = formatVideoUrl(fd.get('vidUrl'));
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: finalVideoUrl, description: fd.get('desc'), comments: [] };
        
        await execDbAction(() => setCourses(courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c))); 
        e.target.reset(); showToast("Materi ditambah!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus materi video ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false }); 
                await execDbAction(() => setCourses(courses.map(c => c.id === courseId ? { ...c, modules: c.modules.filter(m => m.id !== moduleId) } : c))); 
                showToast("Materi dihapus.");
            }
        });
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email').trim().toLowerCase();
        if (participants.some(p => p.email === email)) return showToast("Email terdaftar!");
        const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (myAdmin.maxParticipants <= 0) return showToast("Kuota siswa habis!");

        const newPart = { id: `p_${Date.now()}`, name: fd.get('name').trim(), email, accessCode: fd.get('code').trim() };
        const newEnr = { id: `e_${Date.now()}`, participantId: newPart.id, courseId: fd.get('courseId'), completedModules: [], isGraduated: false, examScore: null };
        
        await execDbAction(() => {
            setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, maxParticipants: a.maxParticipants - 1 } : a));
            setParticipants([...participants, newPart]);
            setEnrollments([...enrollments, newEnr]);
        });
        e.target.reset(); showToast("Peserta terdaftar!");
        triggerEmail({ tujuan: email, subjek: "Pendaftaran Kelas Berhasil", namaPengguna: newPart.name, isiPesanInti: `Anda terdaftar di kelas baru.` + EMAIL_BUTTONS_HTML });
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        let currentExam = course.exam ? JSON.parse(JSON.stringify(course.exam)) : JSON.parse(JSON.stringify(emptyExam));
        while (currentExam.questions.length < 10) currentExam.questions.push({ q: '', options: ['','','',''], answer: 0 });
        setExamCourseId(courseId); setExamForm(currentExam); setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction(() => setCourses(courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c)));
        setExamModalOpen(false); showToast("Ujian disimpan!");
      };

      const handleUpdateAdminInfo = async () => {
          await execDbAction(() => setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, info3: infoInstForm.text, showInfo3: infoInstForm.show } : a))); 
          showToast("Papan Informasi Diperbarui!");
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction(() => setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, donationLink: profileForm.donationLink, whatsapp: profileForm.whatsapp } : a))); 
        showToast("Profil Publik diperbarui!");
      };

      const jumpToClassroom = (courseId, targetModuleId = null) => {
        const course = courses.find(c => c.id === courseId);
        let modToOpen = course.modules[0] || null;
        if (targetModuleId) modToOpen = course.modules.find(m => m.id === targetModuleId) || modToOpen;
        setActiveCourse(course); setActiveModule(modToOpen); setAppMode('classroom');
      };

      const handlePostComment = async (e) => {
        e.preventDefault(); if (!commentText.trim()) return;
        const newComment = { id: `cmt_${Date.now()}`, user: `${session.data.name} (Instruktur)`, text: commentText, isAdmin: true, time: "Baru saja" };
        const latestCourse = courses.find(c => c.id === activeCourse.id) || activeCourse;
        const updatedMods = latestCourse.modules.map(m => m.id === activeModule.id ? { ...m, comments: [...m.comments, newComment] } : m);
        
        await execDbAction(() => setCourses(courses.map(c => c.id === activeCourse.id ? { ...c, modules: updatedMods } : c)));
        setActiveCourse(prev => ({ ...prev, modules: updatedMods })); setActiveModule(prev => ({ ...prev, comments: [...prev.comments, newComment] })); 
        setCommentText(""); showToast("Balasan terkirim!");
      };

      if (!session || !dbReady) return <div className="min-h-screen flex items-center justify-center">Memuat Ruang Instruktur...</div>;

      const myAdmin = admins.find(a => String(a.id) === String(session.data.id)) || session.data;
      const myCourses = courses.filter(c => String(c.authorId) === String(session.data.id));
      const filteredMyCourses = myCourses.filter(c => c.title.toLowerCase().includes(searchCourse.toLowerCase()));
      const myEnrollments = enrollments.filter(e => myCourses.some(c=>String(c.id) === String(e.courseId)));
      const filteredMyEnrs = myEnrollments.filter(enr => { const p = participants.find(x => String(x.id) === String(enr.participantId)); return p?.name.toLowerCase().includes(searchPart.toLowerCase()); });

      if (appMode === 'classroom' && activeCourse) {
        return (
          <div className="flex flex-col h-[100dvh] bg-slate-50">
            <header className="bg-white border-b px-4 py-4 flex items-center justify-between shadow-sm z-45 relative">
              <div className="flex items-center"><BookOpen size={24} className="text-indigo-600 mr-3"/><h1 className="text-xl font-bold">{activeCourse.title} <span className="text-xs font-normal text-slate-500">(Mode Pratinjau Pengajar)</span></h1></div>
              <button onClick={() => setAppMode('dashboard')} className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold flex items-center">Tutup Kelas <ArrowLeft size={16} className="ml-2"/></button>
            </header>
            <div className="flex flex-1 overflow-hidden relative">
              <aside className="w-80 bg-white border-r h-full flex flex-col z-10">
                <div className="p-6 border-b bg-slate-50/50"><h2 className="font-bold text-lg">Kurikulum Kelas</h2></div>
                <div className="overflow-y-auto flex-1 p-4 space-y-2">
                  {activeCourse.modules.map((mod, index) => (
                    <button key={mod.id} onClick={() => setActiveModule(mod)} className={`w-full text-left p-4 rounded-xl flex items-start space-x-3 border ${activeModule?.id === mod.id ? 'bg-indigo-50 border-indigo-200' : 'bg-white'}`}>
                        <PlayCircle size={20} className={activeModule?.id === mod.id ? 'text-indigo-600' : 'text-slate-400'} weight={activeModule?.id === mod.id ? 'fill' : 'regular'} />
                        <span className="text-sm font-bold truncate">{index + 1}. {mod.title}</span>
                    </button>
                  ))}
                </div>
              </aside>
              <main className="flex-1 overflow-y-auto bg-slate-50 relative p-8">
                {activeModule && (
                  <div className="max-w-4xl mx-auto">
                    <div className="relative w-full rounded-3xl overflow-hidden shadow-xl bg-slate-900 mb-8 aspect-video">
                        <iframe src={formatVideoUrl(activeModule.videoUrl)} allowFullScreen className="absolute top-0 left-0 w-full h-full border-0"></iframe>
                    </div>
                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                        <h2 className="text-2xl font-bold mb-4">{activeModule.title}</h2>
                        <p className="text-slate-600 mb-10">{activeModule.description}</p>
                        <div className="pt-8 border-t border-slate-100">
                            <h3 className="text-xl font-bold mb-6 flex items-center"><MessageSquare className="mr-3 text-indigo-600"/> Ruang Diskusi</h3>
                            <form onSubmit={handlePostComment} className="mb-8 flex gap-4">
                                <input type="text" value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder="Balas pertanyaan siswa..." className="flex-1 px-5 py-4 rounded-xl border bg-slate-50" />
                                <button type="submit" disabled={!commentText.trim()} className="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold">Kirim</button>
                            </form>
                            <div className="space-y-4">
                                {activeModule.comments.map(c => (<div key={c.id} className={`p-5 rounded-2xl border ${c.isAdmin ? 'bg-indigo-50 border-indigo-100' : 'bg-white'}`}><p className="font-bold text-sm mb-1">{c.user}</p><p className="text-slate-700">{c.text}</p></div>))}
                            </div>
                        </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col bg-slate-50">
            {toast && <div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2"><CheckCircle2 size={20}/><span>{toast}</span></div>}
            
            {confirmDialog.isOpen && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                <div className="bg-white rounded-3xl p-8 max-w-sm text-center shadow-2xl">
                  <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-600 mx-auto mb-4"><AlertCircle size={32} /></div>
                  <h3 className="text-xl font-bold mb-2">Konfirmasi Tindakan</h3><p className="text-sm text-slate-600 mb-6">{confirmDialog.message}</p>
                  <div className="flex space-x-3"><button onClick={() => setConfirmDialog({ isOpen: false })} className="flex-1 bg-slate-100 py-3 rounded-xl font-bold">Batal</button><button onClick={confirmDialog.onConfirm} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">Ya, Hapus</button></div>
                </div>
              </div>
            )}

            {examModalOpen && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                <div className="bg-white rounded-3xl w-full max-w-3xl flex flex-col max-h-[90vh]">
                    <div className="p-6 border-b flex justify-between items-center bg-slate-50 rounded-t-3xl">
                        <h2 className="text-xl font-bold">Pembuat Ujian (10 Soal)</h2><button onClick={()=>setExamModalOpen(false)} className="text-slate-600"><X size={24}/></button>
                    </div>
                    <div className="p-6 overflow-y-auto flex-1 space-y-6">
                        <div className="bg-amber-50 p-5 rounded-2xl border border-amber-200">
                            <label className="font-bold text-amber-900 block mb-2">Target Minimal Kelulusan</label>
                            <input type="number" min="0" max="100" value={examForm.minScore} onChange={e=>setExamForm({...examForm, minScore: parseInt(e.target.value)})} className="p-3 border rounded-xl font-bold" />
                        </div>
                        {examForm.questions.map((q, idx) => (
                            <div key={idx} className="bg-white p-5 rounded-2xl border shadow-sm">
                                <label className="font-bold block mb-3">Soal {idx+1}</label>
                                <textarea value={q.q} onChange={e=>{const newQ = [...examForm.questions]; newQ[idx].q = e.target.value; setExamForm({...examForm, questions: newQ});}} className="w-full p-3 mb-4 border rounded-xl" placeholder="Tulis soal..."></textarea>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    {q.options.map((opt, optIdx) => (
                                        <input key={optIdx} type="text" value={opt} onChange={e=>{const newQ = [...examForm.questions]; newQ[idx].options[optIdx] = e.target.value; setExamForm({...examForm, questions: newQ});}} className="p-3 border rounded-xl" placeholder={`Opsi ${optIdx+1}`} />
                                    ))}
                                </div>
                                <div className="bg-slate-50 p-3 rounded-xl flex justify-between items-center">
                                    <label className="text-sm font-bold">Jawaban Benar:</label>
                                    <select value={q.answer} onChange={e=>{const newQ = [...examForm.questions]; newQ[idx].answer = parseInt(e.target.value); setExamForm({...examForm, questions: newQ});}} className="p-2 border rounded-lg font-bold">
                                        {q.options.map((_, optIdx) => <option key={optIdx} value={optIdx}>Opsi {optIdx+1}</option>)}
                                    </select>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-6 border-t bg-white rounded-b-3xl flex justify-end gap-4">
                        <button onClick={handleSaveExam} className="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold">Simpan Ujian</button>
                    </div>
                </div>
              </div>
            )}

            <header className="bg-slate-900 text-white px-6 py-4 flex flex-col md:flex-row items-center justify-between shadow-md">
              <div className="flex items-center space-x-2">
                <Database size={28} className="text-indigo-400" />
                <h1 className="text-xl font-bold">Ruang Instruktur EduLearn</h1>
              </div>
              <div className="flex space-x-2 bg-slate-800 p-1.5 rounded-xl overflow-x-auto mt-4 md:mt-0">
                <button onClick={() => setAdminTab('courses')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center ${adminTab==='courses'?'bg-indigo-600 text-white':'text-slate-300'}`}><Book size={18} className="mr-2"/> Kelas</button>
                <button onClick={() => setAdminTab('participants')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center ${adminTab==='participants'?'bg-indigo-600 text-white':'text-slate-300'}`}><Users size={18} className="mr-2"/> Siswa</button>
                <button onClick={() => setAdminTab('info')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center ${adminTab==='info'?'bg-indigo-600 text-white':'text-slate-300'}`}><Article size={18} className="mr-2"/> Papan Info</button>
                <button onClick={() => setAdminTab('profile')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center ${adminTab==='profile'?'bg-indigo-600 text-white':'text-slate-300'}`}><UserIcon size={18} className="mr-2"/> Profil</button>
              </div>
              <button onClick={handleLogout} className="p-2.5 bg-slate-800 text-red-400 rounded-xl mt-4 md:mt-0"><LogOut size={20} /></button>
            </header>

            <div className="flex-1 p-6 lg:p-8 max-w-7xl mx-auto w-full">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
                  <div className="bg-white p-6 rounded-3xl border shadow-sm flex items-center"><div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mr-4"><Book size={26}/></div><div><p className="text-xs font-bold text-slate-400 uppercase">Sisa Kuota Kelas</p><h4 className="text-3xl font-black">{myAdmin.maxCourses || 0} Kelas</h4></div></div>
                  <div className="bg-white p-6 rounded-3xl border shadow-sm flex items-center"><div className="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mr-4"><Users size={26}/></div><div><p className="text-xs font-bold text-slate-400 uppercase">Sisa Kuota Siswa</p><h4 className="text-3xl font-black">{myAdmin.maxParticipants || 0} Siswa</h4></div></div>
              </div>

              {adminTab === 'courses' && (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                  <div className="xl:col-span-1 space-y-8">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border">
                      <h2 className="font-bold text-lg mb-6 flex items-center"><PlusCircle size={22} className="mr-2 text-indigo-600" />Buka Kelas Baru</h2>
                      <form onSubmit={handleCreateCourse} className="space-y-4">
                        <div className="flex items-center gap-2">
                            <input name="code" id="crscode" required className="flex-1 p-3.5 bg-slate-50 border rounded-xl font-mono uppercase font-bold" placeholder="Kode Unik"/>
                            <button type="button" onClick={()=>{document.getElementById('crscode').value = 'CR' + Math.floor(1000 + Math.random() * 9000).toString()}} className="w-14 h-12 bg-slate-100 flex items-center justify-center rounded-xl"><RefreshCw size={20}/></button>
                        </div>
                        <input name="title" required className="w-full p-3.5 bg-slate-50 border rounded-xl" placeholder="Judul Kelas"/>
                        <input name="inst" defaultValue={session.data.name} required className="w-full p-3.5 bg-slate-50 border rounded-xl" placeholder="Nama Pengajar"/>
                        <input name="docLink" type="url" className="w-full p-3.5 bg-emerald-50 border border-emerald-200 rounded-xl" placeholder="Link Materi Ekstra (Opsional)"/>
                        <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Posting Kelas</button>
                      </form>
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border">
                      <h2 className="font-bold text-lg mb-6 flex items-center"><Video size={22} className="mr-2 text-indigo-600" />Upload Video Modul</h2>
                      <form onSubmit={handleCreateModule} className="space-y-4">
                        <select name="courseId" required className="w-full p-3.5 bg-slate-50 border rounded-xl" defaultValue=""><option value="" disabled>-- Pilih Kelas Tujuan --</option>{myCourses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select>
                        <input name="title" required className="w-full p-3.5 bg-slate-50 border rounded-xl" placeholder="Judul Sesi Video"/>
                        <input name="vidUrl" required type="url" className="w-full p-3.5 bg-rose-50 border border-rose-200 rounded-xl" placeholder="Link YT / Drive Video"/>
                        <textarea name="desc" required className="w-full p-3.5 bg-slate-50 border rounded-xl resize-none" rows="3" placeholder="Deskripsi materi..."></textarea>
                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold flex justify-center items-center"><PlayCircle size={20} className="mr-2"/> Simpan Modul</button>
                      </form>
                    </div>
                  </div>
                  <div className="xl:col-span-2">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="font-extrabold text-xl flex items-center"><BookOpen size={24} className="mr-3 text-indigo-600" />Katalog Kelas Anda</h2>
                            <input type="text" placeholder="Cari kursus..." value={searchCourse} onChange={e=>setSearchCourse(e.target.value)} className="w-64 px-4 py-3 bg-slate-50 border rounded-xl"/>
                        </div>
                        {filteredMyCourses.map(course => (
                        <div key={course.id} className="mb-8 border rounded-2xl overflow-hidden shadow-sm">
                            <div className="bg-slate-50 border-b p-6 flex justify-between items-center">
                                <div><span className="font-mono font-black bg-white border px-3 py-1 rounded-full uppercase">{course.code}</span><h3 className="font-extrabold text-xl mt-2">{course.title}</h3></div>
                                <div className="flex gap-2">
                                    <button onClick={() => openExamBuilder(course.id)} className="bg-amber-100 text-amber-800 px-5 py-2.5 rounded-xl font-bold flex items-center"><CheckSquareOffset size={18} className="mr-2"/> Ujian</button>
                                    <button onClick={() => jumpToClassroom(course.id)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center">Buka Kelas <ChevronRight size={16} className="ml-1"/></button>
                                </div>
                            </div>
                            <div className="p-6">
                                <h4 className="text-xs font-bold text-slate-400 uppercase mb-4">Silabus Video</h4>
                                <div className="space-y-2">
                                {course.modules.map((m, i) => (
                                    <div key={m.id} className="flex justify-between items-center p-3 hover:bg-slate-50 rounded-xl border border-transparent transition">
                                        <div className="flex items-center"><div className="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-xs mr-3">{i+1}</div><span className="text-sm font-bold text-slate-700">{m.title}</span></div>
                                        <button onClick={()=>handleDeleteModule(course.id, m.id)} className="text-slate-300 hover:text-red-500"><Trash2 size={18}/></button>
                                    </div>
                                ))}
                                </div>
                            </div>
                        </div>
                        ))}
                    </div>
                  </div>
                </div>
              )}

              {adminTab === 'participants' && (
                <div className="grid grid-cols-1 xl:grid-cols-4 gap-8">
                  <div className="xl:col-span-1 space-y-8">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border">
                      <h2 className="font-bold text-lg mb-6 flex items-center"><PlusCircle size={22} className="mr-2 text-emerald-600" />Daftar Siswa Manual</h2>
                      <form onSubmit={handleRegisterParticipant} className="space-y-4">
                        <input name="name" required className="w-full p-3.5 bg-slate-50 border rounded-xl" placeholder="Nama Lengkap"/>
                        <input name="email" required type="email" className="w-full p-3.5 bg-slate-50 border rounded-xl" placeholder="Email (Akan di-email)"/>
                        <div className="flex gap-2">
                            <input name="code" id="ptcode" required className="flex-1 p-3.5 bg-slate-50 border rounded-xl font-mono" placeholder="PIN Angka"/>
                            <button type="button" onClick={()=>document.getElementById('ptcode').value = Math.floor(100000 + Math.random() * 900000).toString()} className="w-14 bg-slate-100 flex items-center justify-center rounded-xl"><RefreshCw size={20}/></button>
                        </div>
                        <select name="courseId" required className="w-full p-3.5 bg-slate-50 border rounded-xl" defaultValue=""><option value="" disabled>-- Daftarkan ke Kelas --</option>{myCourses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select>
                        <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold">Daftarkan Siswa</button>
                      </form>
                    </div>
                  </div>
                  <div className="xl:col-span-3 bg-white p-6 rounded-3xl shadow-sm border">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="font-extrabold text-xl flex items-center"><GraduationCap size={24} className="mr-3 text-indigo-600" />Progress Siswa</h2>
                        <input type="text" placeholder="Cari siswa..." value={searchPart} onChange={e=>setSearchPart(e.target.value)} className="w-64 px-4 py-3 bg-slate-50 border rounded-xl"/>
                    </div>
                    <div className="overflow-x-auto"><table className="w-full text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500 text-xs uppercase"><tr><th className="p-4">Siswa</th><th className="p-4">Kelas</th><th className="p-4">Progress</th><th className="p-4">Skor Ujian</th><th className="p-4">Status Akhir</th></tr></thead><tbody>
                        {filteredMyEnrs.map(enr => {
                          const part = participants.find(p => String(p.id) === String(enr.participantId)); const crs = courses.find(c => String(c.id) === String(enr.courseId)); const prog = calcProgress(enr, crs); if(!part || !crs) return null;
                          return (<tr key={enr.id} className="border-t border-slate-100">
                              <td className="p-4 font-bold">{part.name}</td><td className="p-4">{crs.title}</td><td className="p-4 font-bold text-slate-600">{prog}%</td><td className="p-4 font-bold">{enr.examScore !== null ? enr.examScore : '--'}</td>
                              <td className="p-4">{enr.isGraduated ? <span className="text-emerald-700 bg-emerald-100 px-3 py-1.5 rounded-lg text-xs font-bold">Lulus</span> : <span className="text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg text-xs font-bold">Proses</span>}</td>
                          </tr>)
                        })}
                    </tbody></table></div>
                  </div>
                </div>
              )}

              {adminTab === 'info' && (
                <div className="bg-white p-8 rounded-3xl shadow-sm border max-w-3xl mx-auto">
                    <h2 className="font-extrabold mb-3 text-2xl flex items-center"><Article size={28} className="mr-3 text-indigo-600" /> Papan Info Siswa</h2>
                    <div className="bg-slate-50 p-6 rounded-3xl border">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <label className="font-bold text-lg">Publikasi Info</label>
                            <button onClick={() => setInfoInstForm({...infoInstForm, show: !infoInstForm.show})} className="px-6 py-2 bg-white border rounded-full font-bold">{infoInstForm.show ? 'Aktif' : 'Sembunyikan'}</button>
                        </div>
                        <textarea value={infoInstForm.text} onChange={e => setInfoInstForm({...infoInstForm, text: e.target.value})} className="w-full p-4 border rounded-2xl resize-none mb-4" rows="4" placeholder="Tulis pengumuman kelas..."></textarea>
                        <button onClick={handleUpdateAdminInfo} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Terapkan Perubahan</button>
                    </div>
                </div>
              )}

              {adminTab === 'profile' && (
                <div className="bg-white p-8 rounded-3xl shadow-sm border max-w-2xl mx-auto">
                  <h2 className="font-extrabold mb-6 text-2xl flex items-center"><UserIcon size={28} className="mr-3 text-indigo-600" /> Profil Publik</h2>
                  <form onSubmit={handleUpdateProfile} className="space-y-6">
                      <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                          <label className="font-bold text-emerald-800 mb-2 block">Nomor WhatsApp Interaksi</label>
                          <input type="text" value={profileForm.whatsapp} onChange={e=>setProfileForm({...profileForm, whatsapp: e.target.value.replace(/[^0-9]/g, '')})} className="w-full p-4 border-0 rounded-xl font-bold text-emerald-900" placeholder="6281234..." />
                      </div>
                      <div className="bg-amber-50 p-6 rounded-3xl border border-amber-100">
                          <label className="font-bold text-amber-800 mb-2 block">Link Trakteer / Donasi</label>
                          <input type="url" value={profileForm.donationLink} onChange={e=>setProfileForm({...profileForm, donationLink: e.target.value})} className="w-full p-4 border-0 rounded-xl font-bold text-amber-900" placeholder="https://trakteer.id/..." />
                      </div>
                      <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-xl font-extrabold">Simpan Profil</button>
                  </form>
                </div>
              )}
            </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<InstrukturApp />);
  </script>
</body>
</html>
