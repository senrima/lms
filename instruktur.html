<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn - Ruang Instruktur</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const API_ENDPOINT = "https://api.s-tools.id";
    const LOGIN_PORTAL_URL = "https://s-tools.id/edu/page-instruktur.html";
    const _0xDbChunks = ["aHR0cHM6Ly9zY3JpcHQuZ29v", "Z2xlLmNvbS9tYWNyb3Mvcy9B", "S2Z5Y2J6RXdlUkQ2dTVmeGVH", "SEtOR0VJTFhZOWkzcXhibTdP", "QVlMZHRaeGxHdmdEOXhDb01D", "aUN3OGJDbmpDLXhad3cxbksv", "ZXhlYw=="];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));
    const EMAIL_BUTTONS_HTML = `<br><br><div style="text-align:center;"><a href="https://s-tools.id/edu/" style="background-color: #4f46e5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: bold; font-family: sans-serif; margin-right: 10px; margin-bottom: 10px;">Masuk ke Dashboard</a></div>`;

    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const Database = (p) => <IconWrapper name="database" {...p} />; const Book = (p) => <IconWrapper name="book" {...p} />; const Users = (p) => <IconWrapper name="users" {...p} />; const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />; const Article = (p) => <IconWrapper name="article" {...p} />; const UserIcon = (p) => <IconWrapper name="user" {...p} />; const LogOut = (p) => <IconWrapper name="sign-out" {...p} />; const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />; const Video = (p) => <IconWrapper name="video" {...p} />; const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />; const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />; const X = (p) => <IconWrapper name="x" {...p} />; const BookOpen = (p) => <IconWrapper name="book-open" {...p} />; const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />; const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />; const Trash2 = (p) => <IconWrapper name="trash" {...p} />; const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />; const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />; const ToggleLeft = (p) => <IconWrapper name="toggle-left" {...p} />; const ToggleRight = (p) => <IconWrapper name="toggle-right" {...p} />; const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />; const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />; const Menu = (p) => <IconWrapper name="list" {...p} />; const Coffee = (p) => <IconWrapper name="coffee" {...p} />; const Lock = (p) => <IconWrapper name="lock" {...p} />; const MagnifyingGlass = (p) => <IconWrapper name="magnifying-glass" {...p} />; const Bell = (p) => <IconWrapper name="bell" {...p} />;

    const emptyExam = { minScore: 70, questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 })) };

    const formatVideoUrl = (rawUrl) => {
        if (!rawUrl) return ""; let url = rawUrl.trim();
        try {
          if (url.includes('youtu.be/')) return `https://www.youtube.com/embed/${url.split('youtu.be/')[1].split('?')[0].split('&')[0]}`;
          if (url.includes('youtube.com/watch')) return `https://www.youtube.com/embed/${new URL(url).searchParams.get('v')}`;
          if (url.includes('youtube.com/shorts/')) return `https://www.youtube.com/embed/${url.split('shorts/')[1].split('?')[0].split('&')[0]}`;
          if (url.includes('drive.google.com/file/d/')) return `https://drive.google.com/file/d/${url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/)[1]}/preview`;
        } catch (e) {} return url;
    };

    const calcProgress = (enr, crs) => { 
        if (!crs || !crs.modules || crs.modules.length === 0 || !enr) return 0; 
        if (enr.isGraduated) return 100;
        let completedArray = Array.isArray(enr.completedModules) ? enr.completedModules : (typeof enr.completedModules === 'string' ? JSON.parse(enr.completedModules || "[]") : []);
        let prog = Math.round((completedArray.length / crs.modules.length) * 100); 
        return prog > 100 ? 100 : prog;
    };

    const PromoTimer = () => {
        const [timeLeft, setTimeLeft] = React.useState("");
        React.useEffect(() => {
            const timer = setInterval(() => {
                const now = new Date(); const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59); const diff = endOfDay - now;
                if (diff <= 0) setTimeLeft("00:00:00");
                else setTimeLeft(`${Math.floor((diff / 3600000) % 24).toString().padStart(2, '0')}:${Math.floor((diff / 60000) % 60).toString().padStart(2, '0')}:${Math.floor((diff / 1000) % 60).toString().padStart(2, '0')}`);
            }, 1000);
            return () => clearInterval(timer);
        }, []);
        if(!timeLeft) return null;
        return (<div className="inline-flex items-center gap-2 bg-rose-50 border border-rose-200 text-rose-600 px-5 py-2.5 rounded-full mb-6 shadow-sm animate-pulse mx-auto"><IconWrapper name="timer" size={20} weight="bold" /><span className="text-sm font-bold">Promo Diskon Berakhir Hari Ini: <span className="font-mono text-base ml-1 tracking-widest">{timeLeft}</span></span></div>);
    };

    function InstrukturApp() {
      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [dbReady, setDbReady] = React.useState(false);
      const [appMode, setAppMode] = React.useState('dashboard');
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      const [toast, setToast] = React.useState(null);
      
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);
      
      const [reqQuotaModal, setReqQuotaModal] = React.useState({ isOpen: false, reason: "", reqCourses: 5, reqParticipants: 50 });
      const [showPricingModal, setShowPricingModal] = React.useState(false);

      const [profileForm, setProfileForm] = React.useState({ donationLink: "", whatsapp: "" });
      const [infoInstForm, setInfoInstForm] = React.useState({ text: '', show: false }); 

      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

      React.useEffect(() => {
        if (!session || session.role !== 'admin') window.location.href = 'index.html';
      }, [session]);

      React.useEffect(() => {
          fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime()).then(res => res.json()).then(data => {
                if(data.admins) setAdmins(data.admins);
                if(data.courses) {
                    const normCourses = data.courses.map(c => {
                        let exam = c.exam || { minScore: 70, questions: [] };
                        if (!exam.questions) exam.questions = [];
                        while(exam.questions.length < 10) exam.questions.push({ q: '', options: ['','','',''], answer: 0 });
                        c.exam = exam; return c;
                    });
                    setCourses(normCourses);
                }
                if(data.participants) setParticipants(data.participants);
                if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications);

                const myData = data.admins?.find(a => String(a.id) === String(session?.data?.id));
                if (myData) {
                    setProfileForm({ donationLink: myData.donationLink || "", whatsapp: myData.whatsapp || "" });
                    setInfoInstForm({ text: myData.info3 || '', show: myData.showInfo3 || false });
                }
                setDbReady(true);
          }).catch(e => showToast("Gagal memuat database."));
      }, []);

      const execDbAction = async (localAction) => {
        try {
            localAction();
            const payload = { admins, courses, participants, enrollments, notifications };
            fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime(), { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) }).catch(console.error);
        } catch (error) { showToast("Gagal menyimpan."); }
      };

      const triggerEmail = (emailAction) => { fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime(), { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ emailAction }) }).catch(console.error); };
      const handleLogout = () => { sessionStorage.removeItem('edu_session'); window.location.href = 'index.html'; };

      const handleCreateCourse = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const code = fd.get('code').trim().toUpperCase();
        if (courses.some(c => c.code === code)) return showToast("Kode sudah ada!");
        const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (myAdmin.maxCourses <= 0) { setConfirmDialog({ isOpen: true, message: "Kuota kelas habis (0). Silakan ajukan penambahan limit.", onConfirm: null }); return; }

        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), isActive: true, docLink: fd.get('docLink'), modules: [], exam: emptyExam };
        await execDbAction(() => {
            setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, maxCourses: a.maxCourses - 1 } : a));
            setCourses([...courses, { id: `c_${Date.now()}`, ...courseData }]);
        });
        e.target.reset(); showToast("Kursus dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const courseId = fd.get('courseId');
        if (enrollments.some(e => String(e.courseId) === String(courseId) && e.isGraduated)) {
            setConfirmDialog({ isOpen: true, message: "Aksi ditolak! Tidak bisa menambah materi karena sudah ada peserta yang lulus.", onConfirm: null }); return;
        }
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: formatVideoUrl(fd.get('vidUrl')), description: fd.get('desc'), comments: [] };
        await execDbAction(() => setCourses(courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c))); e.target.reset(); showToast("Materi ditambah!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        if (enrollments.some(e => String(e.courseId) === String(courseId) && e.isGraduated)) {
            setConfirmDialog({ isOpen: true, message: "Aksi ditolak! Tidak dapat menghapus modul video karena ada peserta lulus.", onConfirm: null }); return;
        }
        setConfirmDialog({ isOpen: true, message: "Hapus materi video ini?", onConfirm: async () => {
            setConfirmDialog({ isOpen: false }); 
            await execDbAction(() => setCourses(courses.map(c => c.id === courseId ? { ...c, modules: c.modules.filter(m => m.id !== moduleId) } : c))); showToast("Materi dihapus.");
        }});
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email').trim().toLowerCase();
        if (participants.some(p => p.email === email)) return showToast("Email terdaftar!");
        const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (myAdmin.maxParticipants <= 0) { setConfirmDialog({ isOpen: true, message: "Kuota pendaftaran siswa Anda habis (0).", onConfirm: null }); return; }

        const newPart = { id: `p_${Date.now()}`, name: fd.get('name').trim(), email, accessCode: fd.get('code').trim() };
        const newEnr = { id: `e_${Date.now()}`, participantId: newPart.id, courseId: fd.get('courseId'), completedModules: [], isGraduated: false, examScore: null };
        await execDbAction(() => {
            setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, maxParticipants: a.maxParticipants - 1 } : a));
            setParticipants([...participants, newPart]); setEnrollments([...enrollments, newEnr]);
        });
        e.target.reset(); showToast("Peserta terdaftar!"); triggerEmail({ tujuan: email, subjek: "Pendaftaran Kelas Berhasil", namaPengguna: newPart.name, isiPesanInti: `Anda terdaftar di kelas baru.` + EMAIL_BUTTONS_HTML });
      };

      const handleEnrollExisting = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email').trim().toLowerCase(); const cId = fd.get('cId');
        const participant = participants.find(p => p.email === email); if (!participant) return showToast("Peserta tidak ditemukan!");
        if(enrollments.some(en => String(en.participantId) === String(participant.id) && String(en.courseId) === String(cId))) return showToast("Sudah terdaftar!");
        const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (myAdmin.maxParticipants <= 0) { setConfirmDialog({ isOpen: true, message: "Kuota siswa habis (0).", onConfirm: null }); return; }
        await execDbAction(() => {
            setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, maxParticipants: a.maxParticipants - 1 } : a));
            setEnrollments([...enrollments, { id: `e_${Date.now()}`, participantId: participant.id, courseId: cId, completedModules: [], isGraduated: false, examScore: null }]);
        }); showToast("Ditambahkan ke kusus!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        let currentExam = course.exam ? JSON.parse(JSON.stringify(course.exam)) : JSON.parse(JSON.stringify(emptyExam));
        setExamCourseId(courseId); setExamForm(currentExam); setExamModalOpen(true);
      };

      const handleSaveExam = async () => { await execDbAction(() => setCourses(courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c))); setExamModalOpen(false); showToast("Ujian disimpan!"); };

      const handleRequestLimitIncrease = async (e) => {
        e.preventDefault(); const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (notifications.some(n => n.courseId === "REQ_UPGRADE" && n.moduleId === myAdmin.id && !n.isRead)) return showToast("Anda memiliki permintaan tertunda!");
        const reqDetails = { name: myAdmin.name, username: myAdmin.username, reason: reqQuotaModal.reason.trim(), reqCourses: parseInt(reqQuotaModal.reqCourses) || 5, reqParticipants: parseInt(reqQuotaModal.reqParticipants) || 50 };
        const superId = admins.find(a => a.isSuper === true || a.isSuper === 'true' || a.isSuper === 'TRUE')?.id || 'adm_super_rahasia';
        await execDbAction(() => setNotifications([{ id: `n_req_${Date.now()}`, adminId: superId, text: JSON.stringify(reqDetails), isRead: false, time: "Baru saja", courseId: "REQ_UPGRADE", moduleId: myAdmin.id }, ...notifications]));
        setReqQuotaModal({ isOpen: false, reason: "", reqCourses: 5, reqParticipants: 50 }); setConfirmDialog({ isOpen: true, message: "Pengajuan penambahan kuota terkirim.", onConfirm: null });
      };

      const handleUpdateAdminInfo = async () => { await execDbAction(() => setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, info3: infoInstForm.text, showInfo3: infoInstForm.show } : a))); showToast("Papan Informasi Diperbarui!"); };
      const handleUpdateProfile = async (e) => { e.preventDefault(); await execDbAction(() => setAdmins(admins.map(a => String(a.id) === String(session.data.id) ? { ...a, donationLink: profileForm.donationLink, whatsapp: profileForm.whatsapp } : a))); showToast("Profil Publik diperbarui!"); };
      const markNotifsRead = async () => { await execDbAction(() => setNotifications(notifications.map(n => String(n.adminId) === String(session.data.id) ? { ...n, isRead: true } : n))); };

      const jumpToClassroom = (courseId, targetModuleId = null) => {
        const course = courses.find(c => c.id === courseId);
        let modToOpen = course.modules[0] || null;
        if (targetModuleId) modToOpen = course.modules.find(m => m.id === targetModuleId) || modToOpen;
        setActiveCourse(course); setActiveModule(modToOpen); setAppMode('classroom');
      };

      const handlePostComment = async (e) => {
        e.preventDefault(); if (!commentText.trim()) return;
        const newComment = { id: `cmt_${Date.now()}`, user: `${session.data.name} (Instruktur)`, text: commentText, isAdmin: true, time: "Baru saja" };
        const updatedMods = activeCourse.modules.map(m => m.id === activeModule.id ? { ...m, comments: [...m.comments, newComment] } : m);
        await execDbAction(() => setCourses(courses.map(c => c.id === activeCourse.id ? { ...c, modules: updatedMods } : c)));
        setActiveCourse(prev => ({ ...prev, modules: updatedMods })); setActiveModule(prev => ({ ...prev, comments: [...prev.comments, newComment] })); 
        setCommentText(""); showToast("Balasan terkirim!");
      };

      if (!session || !dbReady) return <div className="min-h-screen flex items-center justify-center">Memuat Ruang Instruktur...</div>;

      const myAdmin = admins.find(a => String(a.id) === String(session.data.id)) || session.data;
      const myCourses = courses.filter(c => String(c.authorId) === String(session.data.id));
      const filteredMyCourses = myCourses.filter(c => c.title.toLowerCase().includes(searchCourse.toLowerCase()));
      const myEnrollments = enrollments.filter(e => myCourses.some(c=>String(c.id) === String(e.courseId)));
      const filteredMyEnrs = myEnrollments.filter(enr => { const p = participants.find(x => String(x.id) === String(enr.participantId)); return p?.name.toLowerCase().includes(searchPart.toLowerCase()); });
      const myNotifs = notifications.filter(n => n.courseId !== "REQ_UPGRADE" && String(n.adminId) === String(session.data.id));
      const unread = myNotifs.filter(n => !n.isRead).length;
      const hasPendingRequest = notifications.some(n => n.courseId === "REQ_UPGRADE" && n.moduleId === myAdmin.id && !n.isRead);

      if (appMode === 'classroom' && activeCourse) {
        return (
          <div className="flex flex-col h-[100dvh] bg-slate-50">
            <header className="bg-white border-b px-4 py-4 flex items-center justify-between shadow-sm z-45 relative">
              <div className="flex items-center"><BookOpen size={24} className="text-indigo-600 mr-3"/><h1 className="text-xl font-bold">{activeCourse.title} <span className="text-xs font-normal text-slate-500">(Mode Pratinjau Pengajar)</span></h1></div>
              <button onClick={() => setAppMode('dashboard')} className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold flex items-center">Tutup Kelas <ArrowLeft size={16} className="ml-2"/></button>
            </header>
            <div className="flex flex-1 overflow-hidden relative">
              <aside className="w-80 bg-white border-r h-full flex flex-col z-10">
                <div className="p-6 border-b bg-slate-50/50"><h2 className="font-bold text-lg">Kurikulum Kelas</h2></div>
                <div className="overflow-y-auto flex-1 p-4 space-y-2">
                  {activeCourse.modules.map((mod, index) => (
                    <button key={mod.id} onClick={() => setActiveModule(mod)} className={`w-full text-left p-4 rounded-xl flex items-start space-x-3 border ${activeModule?.id === mod.id ? 'bg-indigo-50 border-indigo-200' : 'bg-white'}`}>
                        <PlayCircle size={20} className={activeModule?.id === mod.id ? 'text-indigo-600' : 'text-slate-400'} weight={activeModule?.id === mod.id ? 'fill' : 'regular'} />
                        <span className="text-sm font-bold truncate">{index + 1}. {mod.title}</span>
                    </button>
                  ))}
                </div>
              </aside>
              <main className="flex-1 overflow-y-auto bg-slate-50 relative p-8">
                {activeModule && (
                  <div className="max-w-4xl mx-auto">
                    <div className="relative w-full rounded-3xl overflow-hidden shadow-xl bg-slate-900 mb-8 aspect-video">
                        <iframe src={formatVideoUrl(activeModule.videoUrl)} allowFullScreen className="absolute top-0 left-0 w-full h-full border-0"></iframe>
                    </div>
                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                        <h2 className="text-2xl font-bold mb-4">{activeModule.title}</h2>
                        <p className="text-slate-600 mb-10">{activeModule.description}</p>
                        <div className="pt-8 border-t border-slate-100">
                            <h3 className="text-xl font-bold mb-6 flex items-center"><MessageSquare className="mr-3 text-indigo-600"/> Ruang Diskusi</h3>
                            <form onSubmit={handlePostComment} className="mb-8 flex gap-4">
                                <input type="text" value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder="Balas pertanyaan siswa..." className="flex-1 px-5 py-4 rounded-xl border bg-slate-50" />
                                <button type="submit" disabled={!commentText.trim()} className="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold">Kirim</button>
                            </form>
                            <div className="space-y-4">
                                {activeModule.comments.map(c => (<div key={c.id} className={`p-5 rounded-2xl border ${c.isAdmin ? 'bg-indigo-50 border-indigo-100' : 'bg-white'}`}><p className="font-bold text-sm mb-1">{c.user}</p><p className="text-slate-700">{c.text}</p></div>))}
                            </div>
                        </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col bg-slate-50 animate-[fadeIn_200ms_ease-out]">
            {toast && <div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2"><CheckCircle2 size={20}/><span>{toast}</span></div>}
            
            {confirmDialog.isOpen && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                <div className="bg-white rounded-3xl p-8 max-w-sm text-center shadow-2xl">
                  <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-600 mx-auto mb-4"><AlertCircle size={32} /></div>

                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                      <h2 className="font-bold text-slate-800 mb-6 text-lg flex items-center"><Users size={22} className="mr-2 text-indigo-600" />Siswa Tersedia</h2>
                      <form onSubmit={handleEnrollExisting} className="space-y-4">
                        <input name="email" required type="email" className="w-full p-3.5 bg-slate-50 border rounded-xl text-sm" placeholder="Ketik Email Siswa" />
                        <select name="cId" required className="w-full p-3.5 bg-slate-50 border rounded-xl text-sm" defaultValue=""><option value="" disabled>-- Daftarkan ke Kelas --</option>{myCourses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select>
                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-2">Daftarkan Saja</button>
                      </form>
                    </div>
                  </div>
                  <div className="xl:col-span-3 bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-100">
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                        <h2 className="font-extrabold text-xl flex items-center"><GraduationCap size={24} className="mr-3 text-indigo-600" />Progress Siswa</h2>
                        <div className="relative w-full sm:w-auto"><MagnifyingGlass size={18} className="absolute left-3 top-3.5 text-slate-400"/><input type="text" placeholder="Cari nama siswa..." value={searchPart} onChange={e=>setSearchPart(e.target.value)} className="w-full sm:w-64 pl-10 pr-4 py-3 bg-slate-50 border rounded-xl text-sm"/></div>
                    </div>
                    <div className="overflow-x-auto"><table className="w-full text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500 text-xs uppercase"><tr><th className="p-4">Siswa</th><th className="p-4">Pin Akses</th><th className="p-4">Kelas</th><th className="p-4">Track Belajar</th><th className="p-4">Nilai</th><th className="p-4">Status</th></tr></thead><tbody className="text-sm">
                        {filteredMyEnrs.map(enr => {
                          const part = participants.find(p => String(p.id) === String(enr.participantId)); const crs = courses.find(c => String(c.id) === String(enr.courseId)); const prog = calcProgress(enr, crs); if(!part || !crs) return null;
                          return (<tr key={enr.id} className="hover:bg-slate-50 border-t border-slate-100">
                              <td className="p-4 font-bold text-slate-800">{part.name}</td><td className="p-4 font-mono text-slate-500">{part.accessCode}</td><td className="p-4">{crs.title}</td>
                              <td className="p-4"><div className="flex items-center w-32"><div className="w-full bg-slate-200 rounded-full h-2.5 mr-3"><div className="h-2.5 rounded-full bg-emerald-500" style={{width:`${prog}%`}}></div></div><span className="font-bold text-xs text-slate-600">{prog}%</span></div></td>
                              <td className="p-4 font-extrabold">{enr.examScore !== null ? enr.examScore : '--'}</td>
                              <td className="p-4">{enr.certDownloaded ? <span className="text-emerald-700 bg-emerald-100 px-3 py-1.5 rounded-lg text-[10px] font-bold">Sertifikat</span> : enr.isGraduated ? <span className="text-blue-700 bg-blue-50 px-3 py-1.5 rounded-lg text-[10px] font-bold">Lulus</span> : <span className="text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg text-[10px] font-bold">Proses</span>}</td>
                          </tr>)
                        })}
                    </tbody></table></div>
                  </div>
                </div>
              )}

              {adminTab === 'info' && (
                <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border max-w-3xl mx-auto">
                    <h2 className="font-extrabold text-slate-800 mb-8 text-2xl flex items-center"><Article size={28} className="mr-3 text-indigo-600" /> Papan Info Siswa</h2>
                    <div className="bg-slate-50 p-6 md:p-8 rounded-3xl border border-slate-200">
                        <div className="flex justify-between items-center mb-6 border-b border-slate-200 pb-6">
                            <label className="font-extrabold text-lg">Sakelar Publikasi</label>
                            <button onClick={() => setInfoInstForm({...infoInstForm, show: !infoInstForm.show})} className={`px-6 py-2.5 rounded-full text-sm font-bold flex items-center ${infoInstForm.show ? 'bg-indigo-600 text-white' : 'bg-white border text-slate-500'}`}>{infoInstForm.show ? <ToggleRight size={22} className="mr-2" weight="fill"/> : <ToggleLeft size={22} className="mr-2"/>} {infoInstForm.show ? 'ON - Mengudara' : 'OFF - Disembunyikan'}</button>
                        </div>
                        <textarea value={infoInstForm.text} onChange={e => setInfoInstForm({...infoInstForm, text: e.target.value})} className="w-full p-5 border rounded-2xl resize-none mb-6 text-base" rows="5" placeholder="Cth: Jangan lupa kerjakan Quiz..."></textarea>
                        <button onClick={handleUpdateAdminInfo} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Terapkan Perubahan</button>
                    </div>
                </div>
              )}

              {adminTab === 'profile' && (
                <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border max-w-2xl mx-auto">
                  <h2 className="font-extrabold text-slate-800 mb-8 text-2xl flex items-center"><UserIcon size={28} className="mr-3 text-indigo-600" /> Profil Publik & Apresiasi</h2>
                  
                  <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 mb-6">
                      <label className="text-xs font-bold text-indigo-800 uppercase block mb-3"><IconWrapper name="storefront" size={16} weight="fill" className="inline mr-1"/> Link Etalase Katalog Promo Anda</label>
                      <div className="flex gap-3">
                          <input type="text" readOnly value={`https://s-tools.id/edu/kelas.html?instructor=${session.data.username}`} className="flex-1 p-4 bg-white border border-indigo-200 rounded-2xl text-indigo-900 font-medium text-sm" />
                          <button type="button" onClick={() => { navigator.clipboard.writeText(`https://s-tools.id/edu/kelas.html?instructor=${session.data.username}`); showToast("Link disalin!"); }} className="bg-indigo-600 text-white px-5 rounded-2xl font-bold"><IconWrapper name="copy" size={18} weight="bold" /></button>
                      </div>
                      <p className="text-[10px] text-indigo-500 mt-3">* Fitur Etalase Publik ini butuh langganan <b>Paket Enterprise</b>.</p>
                  </div>
                  
                  <form onSubmit={handleUpdateProfile} className="space-y-6">
                      <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                          <label className="text-xs font-bold text-emerald-800 uppercase block mb-3"><IconWrapper name="whatsapp-logo" size={16} weight="fill" className="inline mr-1"/> Nomor WhatsApp Interaksi</label>
                          <input type="text" value={profileForm.whatsapp} onChange={e=>setProfileForm({...profileForm, whatsapp: e.target.value.replace(/[^0-9]/g, '')})} className="w-full p-4 border-0 rounded-2xl bg-white text-emerald-900 font-medium" placeholder="628123456789" />
                      </div>
                      <div className="bg-amber-50 p-6 rounded-3xl border border-amber-100">
                          <label className="text-xs font-bold text-amber-800 uppercase block mb-3"><IconWrapper name="heart" size={16} weight="fill" className="inline mr-1"/> Tautan Apresiasi Kreator</label>
                          <input type="url" value={profileForm.donationLink} onChange={e=>setProfileForm({...profileForm, donationLink: e.target.value})} className="w-full p-4 border-0 rounded-2xl bg-white text-amber-900 font-medium" placeholder="https://trakteer.id/..." />
                      </div>
                      <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-xl font-extrabold">Simpan Profil Publik</button>
                  </form>
                </div>
              )}

              {adminTab === 'notifications' && (
                <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border max-w-4xl mx-auto">
                  <h2 className="font-extrabold text-slate-800 mb-8 text-2xl flex items-center"><MessageSquare size={28} className="mr-3 text-indigo-600" /> Forum Interaktif Siswa</h2>
                  <div className="space-y-4">
                      {myNotifs.length === 0 ? <div className="text-center p-12"><p className="text-slate-400 font-medium">Kotak masuk sepi. Belum ada siswa yang berdiskusi.</p></div> : myNotifs.map(n => (
                          <div key={n.id} className={`flex justify-between items-center p-5 rounded-2xl border ${n.isRead ? 'bg-white' : 'bg-indigo-50 border-indigo-200'}`}>
                              <div><div className="flex items-center mb-1"><span className="w-2 h-2 rounded-full bg-indigo-500 mr-2"></span><p className="font-bold text-slate-800">{n.text}</p></div><p className="text-xs text-slate-400 uppercase ml-4">{n.time}</p></div>
                              {n.courseId && <button onClick={() => jumpToClassroom(n.courseId, n.moduleId)} className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold">Balas di Kelas</button>}
                          </div>
                      ))}
                  </div>
                </div>
              )}
            </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<InstrukturApp />);
  </script>
</body>
</html>
